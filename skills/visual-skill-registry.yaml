version: 1
description: Visual production skill registry for presentation-system.

skills:
  - id: stylekit-skill
    category: design_identity
    required_when: [visual_design, style_frame, aesthetic_recovery, user_requests_high_quality_design]
    required_outputs: [StyleCandidateTable, StyleOwnership, QualityGate]
    manual_equivalent_allowed: true
    blocker_if_user_requires_real_call: true

  - id: taste-skill
    category: aesthetic_preflight
    required_when: [visual_design, anti_template, user_says_ugly, user_says_template, aesthetic_recovery]
    required_outputs: [DesignRead, DesignDials, AntiTemplatePreflight, AestheticRiskList]
    manual_equivalent_allowed: true
    blocker_if_user_requires_real_call: true

  - id: design-dna
    aliases: [PPT-Design-DNA-main, PPT DNA]
    category: design_identity
    required_when: [design_dna, ppt_dna, visual_production, style_frame, html, ppt]
    required_outputs: [PresentationDesignDNA, DesignSystem, DesignStyle, VisualEffects, DNAToPageMapping]
    manual_equivalent_allowed: true
    blocker_if_user_requires_real_call: true

  - id: guizang-ppt-skill
    aliases: [guizang, 归藏]
    category: presentation_layout_engine
    required_when: [guizang, ppt, slides, html_ppt, page_family, style_frame, horizontal_presentation]
    required_outputs: [GuizangRouteDecision, ThemeRhythm, LayoutMapping, PageFamilyMapping, RejectedTemplateRoutes]
    manual_equivalent_allowed: true
    blocker_if_user_requires_real_call: true

  - id: frontend-slides
    category: html_experience_engine
    required_when: [html, interactive_slides, animated_html, browser_presentation, fixed_stage]
    required_outputs: [FixedStageDecision, StylePreviewSet, AnimationPatternMap, HTMLExperienceConstraints]
    manual_equivalent_allowed: true
    blocker_if_user_requires_real_call: true

  - id: html-ppt
    category: html_ppt_engine
    required_when: [html_ppt, html_deck, template_html, speaker_mode, exportable_html]
    required_outputs: [ThemeLayoutAnimationMapping, SpeakerModeDecision, ExportModeDecision, TemplateAdaptationTable]
    manual_equivalent_allowed: true
    blocker_if_user_requires_real_call: true

  - id: huashu-design
    category: high_fidelity_visual_direction
    required_when: [high_fidelity, design_variants, motion_director, user_says_not_beautiful, aesthetic_recovery]
    required_outputs: [ThreeDirectionExploration, VisualCritique, MotionDirectorDecision, ExpertReview]
    manual_equivalent_allowed: true
    blocker_if_user_requires_real_call: true

  - id: humanize-ppt
    category: narrative_and_page_brief
    required_when: [content_to_deck, teaching_material, speech_notes, narrative_structure, dense_source_material]
    required_outputs: [NarrativeAST, PageBrief, SpeakerActionMap, MediaDecision]
    manual_equivalent_allowed: true
    blocker_if_user_requires_real_call: true

  - id: ppt-master
    category: pptx_delivery_engine
    required_when: [pptx, editable_ppt, master_template, chart_editability]
    required_outputs: [PPTXRouteDecision, EditabilityDecision, MasterTemplateDecision, ExportConstraints]
    manual_equivalent_allowed: true
    blocker_if_user_requires_real_call: true

  - id: last30days-search
    category: current_research
    required_when: [last30days, current_trends, latest_visual_reference, user_requests_recent_examples, official_docs]
    required_outputs: [Last30DaysVisualPulse, SourceList, TrendExtraction, AdoptRejectTable]
    manual_equivalent_allowed: false
    blocker_if_user_requires_real_call: true
