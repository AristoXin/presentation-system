interface:
  display_name: "Presentation System"
  short_description: "Govern deck quality, aesthetics, teams, and Skill audits"
  default_prompt: "Use $presentation-system for presentation governance, failure recovery, complete Skill audits, multi-role production, page-count sufficiency, deep aesthetics/layout work, online research toolchain governance, external visual references, latest frontend docs, browser visual validation, Design Skill Stack integration, StyleKit/taste/PPT-DNA/guizang/frontend-slides/html-ppt/huashu-design absorption, UI/motion/copy QA, and formal visual deliverables. First classify the task as read-only audit, Skill governance, complete Skill audit, or production/repair. When the user says previous issues were not solved or asks to update the Skill itself, freeze production, update cross-project rules and evidence, and do not create or modify HTML/PPT/PDF deliverables. Missing Tavily/Brave/Firecrawl/Context7/Playwright MCP or equivalent controls require a user consent request before install/enablement; user refusal stops the current task. Required subagents are created by default without asking for user permission. Do not use it for simple exports, ordinary document conversion, or tiny one-off edits unless the user asks for presentation governance, deck quality, aesthetics, motion, online search, browser validation, subagents, or failure review."

policy:
  allow_implicit_invocation: false
