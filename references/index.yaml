version: 1
description: Reference routing index for presentation-system. Load only references matching the selected mode and task triggers.

modes:
  review_only:
    description: Read-only audit or recommendation tasks.
    gates: [G1, G2, G4]
  skill_governance:
    description: Tasks that modify the skill system itself.
    gates: [G1, G2, G3, G4]
  production:
    description: Tasks that create, repair, freeze, or deliver final visual artifacts.
    gates: [G1, G2, G3, G4, G5, G6, G7]
  failure_recovery:
    description: Tasks triggered by user dissatisfaction, process failure, or missing evidence.
    gates: [G3, G4, G5, G7, G8]
  capability_limited:
    description: Tasks affected by missing tools or unavailable capabilities.
    gates: [G2, G4, G5, G6, G7]

references:
  - id: R00
    path: references/00-production-gate.md
    title: Production Gate
    read_when: [production, repair, qa_freeze, style_frame, failure_recovery, visual_qa]
    gates: [G1, G2, G3, G5, G7, G8]
    required_outputs: [ProductionGateDecision, BlockerList]

  - id: R00B
    path: references/00-system-overview.md
    title: System Overview
    read_when: [review_only, skill_governance, production, explain_system, full_audit]
    gates: [G1, G2, G4]
    required_outputs: [SystemScopeDecision]

  - id: R01
    path: references/01-team-roles.md
    title: Team Roles
    read_when: [production, repair, qa_freeze, team_governance, multi_agent, work_platform]
    gates: [G1, G5, G7]
    required_outputs: [RoleMap, ResponsibilityMatrix]

  - id: R02
    path: references/02-workflow.md
    title: Workflow
    read_when: [production, skill_governance, project_start, template_intake, unclear_intent]
    gates: [G1, G2, G3, G4]
    required_outputs: [WorkflowDecision, RequirementLock]

  - id: R03
    path: references/03-delivery-routing.md
    title: Delivery Routing
    read_when: [production, delivery_format, html, pptx, pdf, screenshot_pack, notes]
    gates: [G1, G2, G4, G7]
    required_outputs: [DeliveryRouteDecision]

  - id: R04
    path: references/04-design-standards.md
    title: Design Standards
    read_when: [production, visual_design, style_frame, page_spec, failure_recovery, anti_ai_flavor]
    gates: [G1, G4, G7, G8]
    required_outputs: [DesignStandardChecklist, PageSpecRiskList]

  - id: R05
    path: references/05-content-standards.md
    title: Content Standards
    read_when: [production, content_rewrite, narrative, speaker_notes, report_to_deck, teaching_material]
    gates: [G1, G3, G4]
    required_outputs: [ContentGapList, NarrativeDraft]

  - id: R06
    path: references/06-interaction-standards.md
    title: Interaction Standards
    read_when: [html, interactive_slides, browser_validation, presentation_chrome, controls, responsive]
    gates: [G1, G4, G7]
